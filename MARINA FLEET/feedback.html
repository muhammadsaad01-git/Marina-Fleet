    <!-- booking btn -->
    <section class="hero">
      <div class="container">
        <h1>Feedback Form</h1>
        <h4>We value your feedback</h4>
        <p>Your feedbeck help us to improve our service. Please let us know</p>
        <p>about your experience with Marina Fleet</p>
        
      </div>
    </section>

<div class="feedback-container">
    <h2>Feedback </h2>
    

    <form>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Marine ID</label>
            <input type="text" placeholder="Enter your Marine ID" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Rate Our Service</label>
            <div class="rating">
                <input type="radio" id="star5" name="rating">
                <label for="star5">★</label>

                <input type="radio" id="star4" name="rating">
                <label for="star4">★</label>

                <input type="radio" id="star3" name="rating">
                <label for="star3">★</label>

                <input type="radio" id="star2" name="rating">
                <label for="star2">★</label>

                <input type="radio" id="star1" name="rating">
                <label for="star1">★</label>
            </div>
        </div>

        <div class="form-group">
            <label>Your Feedback</label>
            <textarea rows="4" placeholder="Write your feedback..." required></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit </button>

    </form>
</div>
